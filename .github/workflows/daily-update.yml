name: Scheduled Repository Update

on:
  schedule:
    - cron: "0 0 * * *"   # Daily at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate file
        run: |
          mkdir -p generated
          {
            echo "# Generated Report"
            echo ""
            echo "Last updated: $(date -u)"
          } > generated/report.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add generated/report.md

          messages=(
            "chore: refresh generated report"
            "docs: update generated metadata"
            "chore: scheduled repository maintenance"
            "build: regenerate project artifacts"
            "docs: refresh repository information"
            "chore: update generated files"
            "maintenance: scheduled repository update"
          )

          day=$(date +%u)  # 1-7
          message="${messages[$((day-1))]}"

          git diff --cached --quiet && exit 0

          git commit -m "$message"
          git push